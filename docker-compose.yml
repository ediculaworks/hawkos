# Hawk OS — Multi-Tenant Docker Compose
# 1 Web Dashboard + N Agent instances
# All services share the same .env with Admin Supabase credentials.
# Each agent differentiates by AGENT_SLOT (ten1-ten6).
#
# Usage:
#   docker compose up -d              # start all
#   docker compose up -d web          # start web only
#   docker compose up -d agent-ten1   # start single agent
#   docker compose logs -f agent-ten1 # follow agent logs

x-agent-defaults: &agent-defaults
  build:
    context: .
    dockerfile: Dockerfile.agent
  env_file: .env
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  deploy:
    resources:
      limits:
        memory: 512M
  volumes:
    - backups:/data/backups
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Next.js Dashboard (shared by all tenants) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - HOSTNAME=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Agent Instances (one per tenant) ───────────────────────────────────
  # Each agent reads AGENT_SLOT → queries Admin Supabase → decrypts tenant
  # credentials → connects to tenant's Supabase, Discord, OpenRouter.

  agent-ten1:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten1
    ports:
      - "3011:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten2:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten2
    ports:
      - "3012:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten3:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten3
    ports:
      - "3013:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten4:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten4
    ports:
      - "3014:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten5:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten5
    ports:
      - "3015:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten6:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten6
    ports:
      - "3016:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  backups:
    driver: local
