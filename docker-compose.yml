# Hawk OS — Multi-Tenant Docker Compose
# PostgreSQL + PgBouncer + 1 Web Dashboard + N Agent instances
# All services share the same .env.
# Each agent differentiates by AGENT_SLOT (ten1-ten6).
#
# Usage:
#   docker compose up -d              # start all
#   docker compose up -d postgres     # start database only
#   docker compose up -d web          # start web only
#   docker compose up -d agent-ten1   # start single agent
#   docker compose logs -f agent-ten1 # follow agent logs

x-agent-defaults: &agent-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile.agent
  env_file: .env
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 512M
  volumes:
    - backups:/data/backups
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── PostgreSQL 17 + pgvector ───────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: hawkos
      POSTGRES_USER: ${POSTGRES_USER:-hawkos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hawkos} -d hawkos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PgBouncer (connection pooling) ─────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hawkos}:${POSTGRES_PASSWORD}@postgres:5432/hawkos
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    ports:
      - "127.0.0.1:6432:6432"
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Caddy (reverse proxy + automatic HTTPS) ────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Next.js Dashboard (shared by all tenants) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      - HOSTNAME=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Agent Instances (one per tenant) ───────────────────────────────────
  # Each agent reads AGENT_SLOT → queries Admin Supabase → decrypts tenant
  # credentials → connects to tenant's Supabase, Discord, OpenRouter.

  agent-ten1:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten1
    ports:
      - "3011:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten2:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten2
    ports:
      - "3012:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten3:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten3
    ports:
      - "3013:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten4:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten4
    ports:
      - "3014:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten5:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten5
    ports:
      - "3015:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-ten6:
    <<: *agent-defaults
    environment:
      - AGENT_SLOT=ten6
    ports:
      - "3016:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
    driver: local
  backups:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
