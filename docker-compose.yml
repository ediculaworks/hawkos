# Hawk OS — Docker Compose
# PostgreSQL + PgBouncer + Web Dashboard + Single Multi-Tenant Agent
#
# The agent loads ALL active tenants from the admin schema on startup.
# New tenants created via onboarding are hot-loaded automatically.
# No per-tenant containers or AGENT_SLOT needed.
#
# Usage:
#   docker compose up -d                  # start all
#   docker compose up -d postgres         # database only
#   docker compose up -d web              # dashboard only
#   docker compose up -d agent            # agent only
#   docker compose logs -f agent          # follow agent logs

services:
  # ── PostgreSQL 17 + pgvector ───────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: hawkos
      POSTGRES_USER: ${POSTGRES_USER:-hawkos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hawkos} -d hawkos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PgBouncer (connection pooling) ─────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hawkos}:${POSTGRES_PASSWORD}@postgres:5432/hawkos
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    ports:
      - "127.0.0.1:6432:6432"
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Caddy (reverse proxy + automatic HTTPS) ────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Next.js Dashboard (shared by all tenants) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      - HOSTNAME=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Ollama (local LLM inference — simple tier) ─────────────────────────────
  # Serves gemma4:e2b for simple queries (greetings, CRUD) — zero OpenRouter cost.
  # Model downloaded automatically on first request (~7.2GB, stored in volume).
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: '0.0.0.0:11434'
      OLLAMA_NUM_PARALLEL: '2'    # allow 2 concurrent requests (aligns with MAX_OLLAMA_CONCURRENT)
      OLLAMA_KEEP_ALIVE: '30m'    # keep model in RAM between requests (default is 5m)
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10G
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Agent (single process, serves ALL tenants) ─────────────────────────
  # On startup: loads all active tenants from admin.tenants
  # Creates one Discord client per tenant, scoped crons via withSchema()
  # Hot-loads new tenants via POST /admin/tenants/:slug/start
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - backups:/data/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  pgdata:
    driver: local
  backups:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  ollama_data:
    driver: local
